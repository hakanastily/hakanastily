<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hakanastily</title>
    <link rel="icon" href="logo.png" type="image/jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: radial-gradient(circle at center, #3b0764 0%, #000000 80%);
            color: #ffffff;
        }

        .glass-card {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(147, 51, 234, 0.2);
            box-shadow: 0 0 50px rgba(147, 51, 234, 0.15);
        }

        .purple-glow:hover {
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.8);
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #a855f7;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center overflow-hidden font-sans">

    <div class="glass-card p-8 rounded-3xl max-w-sm w-full text-center transform transition duration-500 hover:scale-[1.02]">
        
        <div class="relative w-32 h-32 mx-auto mb-6">
            <img src="avatar.jpeg" 
                 alt="Profil" 
                 class="w-full h-full rounded-full object-cover border-[3px] border-purple-900/50 shadow-xl ring-2 ring-purple-500/20">
            
            <div class="absolute bottom-1 right-1 w-4 h-4 bg-purple-500 border-2 border-black rounded-full"></div>
        </div>

        <h1 class="text-3xl font-extrabold flex items-center justify-center gap-2 tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-purple-200">
            Hakan
            <i class="fa-solid fa-circle-check text-purple-500 text-xl"></i>
        </h1>

        <div class="h-6 mt-3 text-purple-300/80 font-mono text-sm tracking-wider uppercase">
            <span id="typewriter"></span><span class="cursor">&nbsp;</span>
        </div>

        <div class="flex justify-center gap-5 mt-8">
            <a href="https://github.com/hakanastily" target="_blank" class="text-2xl text-gray-400 hover:text-purple-400 transition duration-300 purple-glow">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/hakanastily/" target="_blank" class="text-2xl text-gray-400 hover:text-purple-400 transition duration-300 purple-glow">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a href="https://discord.gg/eAEdvaRm" target="_blank" class="text-2xl text-gray-400 hover:text-purple-400 transition duration-300 purple-glow">
                <i class="fa-brands fa-discord"></i>
            </a>
        </div>

        <div class="mt-8 space-y-3">
            <a href="https://www.youtube.com/@hakanastily/" class="group flex items-center justify-center w-full py-3 px-4 rounded-xl bg-black/40 hover:bg-purple-900/20 transition duration-300 border border-purple-500/10 hover:border-purple-500/40 text-sm font-medium">
                <i class="fa-solid fa-rocket mr-3 text-purple-500 group-hover:text-purple-300 transition"></i> 
                <span class="group-hover:text-purple-100 transition">YouTube</span>
            </a>
        </div>
       <div id="spotify-card" class="mt-6 p-4 rounded-xl bg-black/40 border border-green-500/20 hidden flex items-center gap-4 backdrop-blur-md transition-all">
            <i class="fa-brands fa-spotify text-green-500 text-3xl animate-pulse"></i>
            <div class="text-left w-full overflow-hidden">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Şu an Spotify'da</p>
                <p id="song-name" class="font-bold text-white text-sm truncate">Şarkı Adı</p>
                <p id="artist-name" class="text-xs text-green-400 truncate">Sanatçı</p>
            </div>
        </div>

        <script>
            const discordId = "425665649260363786";

            function updateSpotify() {
                fetch(`https://api.lanyard.rest/v1/users/${discordId}`)
                    .then(res => res.json())
                    .then(data => {
                        const spotifyCard = document.getElementById('spotify-card');
                        if (data.success && data.data.spotify) {
                            document.getElementById('song-name').textContent = data.data.spotify.song;
                            document.getElementById('artist-name').textContent = data.data.spotify.artist;
                            spotifyCard.classList.remove('hidden');
                        } else {
                            spotifyCard.classList.add('hidden');
                        }
                    })
                    .catch(err => console.log("Spotify verisi çekilemedi:", err));
            }

            updateSpotify();
            setInterval(updateSpotify, 5000);
        </script>
    </div>

    <script>
        const texts = ["Developer", "Gamer", "Night Owl"];
        let count = 0;
        let index = 0;
        let currentText = "";
        let letter = "";

        (function type() {
            if (count === texts.length) {
                count = 0;
            }
            currentText = texts[count];
            letter = currentText.slice(0, ++index);

            document.getElementById("typewriter").textContent = letter;

            if (letter.length === currentText.length) {
                setTimeout(() => {
                    count++;
                    index = 0;
                }, 2000);
            }
            
            setTimeout(type, 100);
        })();
    </script>
</body>
</html>
