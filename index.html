</div>

<script>
    const discordId = "425665649260363786";

    function updateActivities() {
        fetch(`https://api.lanyard.rest/v1/users/${discordId}`)
            .then(res => res.json())
            .then(data => {
                if (!data.success) return;

                const spotifyCard = document.getElementById('spotify-card');
                if (data.data.spotify) {
                    document.getElementById('song-name').textContent = data.data.spotify.song;
                    document.getElementById('artist-name').textContent = data.data.spotify.artist;
                    spotifyCard.classList.remove('hidden');
                } else {
                    spotifyCard.classList.add('hidden');
                }

                const gameCard = document.getElementById('game-card');
                const gameActivity = data.data.activities.find(activity => activity.type === 0);
                
                if (gameActivity) {
                    document.getElementById('game-name').textContent = gameActivity.name;
                    document.getElementById('game-details').textContent = gameActivity.details || "Oyun Oynuyor";
                    gameCard.classList.remove('hidden');
                } else {
                    gameCard.classList.add('hidden');
                }
            })
            .catch(err => console.log("Veri çekilemedi:", err));
    }

    updateActivities();
    setInterval(updateActivities, 5000);
</script>
<div class="mt-8 pt-4 border-t border-purple-500/20 flex justify-center items-center gap-2 text-xs text-purple-300/60 font-mono">
        <i class="fa-solid fa-eye animate-pulse"></i>
        <span>PROFILE VIEWS:</span>
        <img src="https://hits.sh/hakanastily.com.svg?style=flat-square&label=+&color=a855f7" alt="Sayaç" class="h-4 opacity-80 rounded">
    </div>

    <script>
        const texts = ["Not Zenin?, Huh!", "Fushiguro", "Night Owl"];
        let count = 0;
        let index = 0;
        let currentText = "";
        let letter = "";

        (function type() {
            if (count === texts.length) {
                count = 0;
            }
            currentText = texts[count];
            letter = currentText.slice(0, ++index);

            document.getElementById("typewriter").textContent = letter;

            if (letter.length === currentText.length) {
                setTimeout(() => {
                    count++;
                    index = 0;
                }, 2000);
            }
            
            setTimeout(type, 100);
        })();
    </script>
